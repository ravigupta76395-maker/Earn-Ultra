<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Earn Ultra Mini</title>
<style>
  :root { --dark:#0A0A0F; --card:#13131A; --accent:#7C3AED; --gold:#F4C430; --text:#F1F1F1; --muted:#888; --border:rgba(255,255,255,.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:40px 32px; width:100%; max-width:380px; }
  .logo { text-align:center; font-size:2rem; font-weight:900; background:linear-gradient(135deg,var(--gold),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
  .sub { text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:32px; }
  .input-field { width:100%; background:#1A1A25; border:1px solid var(--border); color:var(--text); padding:14px 16px; border-radius:12px; font-size:1rem; outline:none; margin-bottom:16px; transition:.2s; }
  .input-field:focus { border-color:var(--accent); }
  .btn { width:100%; padding:15px; background:linear-gradient(135deg,var(--accent),#9F67FF); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; }
  .err { color:#EF4444; font-size:.85rem; text-align:center; margin-top:12px; display:none; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">⚡ Admin Panel</div>
  <div class="sub">Earn Ultra Mini • Admin Access</div>
  <input class="input-field" type="password" id="pwd" placeholder="Enter admin password..." onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">🔐 Login</button>
  <div class="err" id="err">❌ Wrong password</div>
</div>
<script>
async function login() {
  const pwd = document.getElementById('pwd').value;
  const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
  const d = await res.json();
  if (d.success) window.location.href = '/admin';
  else { document.getElementById('err').style.display='block'; }
}
</script>
</body>
</html>
